apiVersion: v1
kind: Console
metadata:
  name: fulcrum-console
spec:
  panels:
    - id: intro
      type: markdown
      content:
        title: Fulcrum — Incident Response Agent
        body: |
          **How to trigger an investigation**

          ```bash
          curl -X POST <WEBHOOK_URL> \
            -H "Content-Type: application/json" \
            -d '{"container_id": "target-v2", "error_signature": "redis: ECONNREFUSED 127.0.0.1:6379"}'
          ```

          **Flow:** Webhook → `/investigate` → 3× parallel Level 1 forks → `/plan` (Claude) → 3× Level 2 forks → `/apply` winner → Slack

          | Service | Port |
          |---|---|
          | target:v1 (healthy) | 3001 |
          | target:v2 (broken)  | 3002 |
          | Fulcrum API         | 8000 |

    - id: webhook-node
      type: node
      content:
        title: Webhook Trigger
        node: webhook

    - id: investigate-node
      type: node
      content:
        title: Investigate
        node: investigate

    - id: plan-node
      type: node
      content:
        title: AI Planner
        node: plan

    - id: apply-node
      type: node
      content:
        title: Apply Winner
        node: apply

    - id: fork-status
      type: nodes
      content:
        title: Fork Status
        nodes:
          - node: l1-rollback
          - node: l1-restart
          - node: l1-fix-redis
          - node: l2-s1
          - node: l2-s2
          - node: l2-s3

    - id: recent-runs
      type: table
      content:
        title: Recent Investigations
        dataSource:
          kind: executions
          limit: 20
        render:
          kind: table
          columns:
            - field: status
            - field: nodeName
            - field: durationMs

  layout:
    - { i: intro,            x: 0, y: 0,  w: 12, h: 6,  minW: 2, minH: 2 }
    - { i: webhook-node,     x: 0, y: 6,  w: 3,  h: 4,  minW: 2, minH: 2 }
    - { i: investigate-node, x: 3, y: 6,  w: 3,  h: 4,  minW: 2, minH: 2 }
    - { i: plan-node,        x: 6, y: 6,  w: 3,  h: 4,  minW: 2, minH: 2 }
    - { i: apply-node,       x: 9, y: 6,  w: 3,  h: 4,  minW: 2, minH: 2 }
    - { i: fork-status,      x: 0, y: 10, w: 12, h: 6,  minW: 2, minH: 2 }
    - { i: recent-runs,      x: 0, y: 16, w: 12, h: 8,  minW: 2, minH: 2 }
